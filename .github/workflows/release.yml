name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Package extension
        run: |
          cd dist
          zip -r ../tabpilot-${GITHUB_REF_NAME}.zip . -x "*.DS_Store" ".vite/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TabPilot ${{ github.ref_name }}
          files: tabpilot-${{ github.ref_name }}.zip
          generate_release_notes: true
          body: |
            ## Install

            1. Download `tabpilot-${{ github.ref_name }}.zip` below
            2. Unzip to a folder
            3. Open `chrome://extensions` → enable **Developer Mode**
            4. Click **Load unpacked** → select the unzipped folder
