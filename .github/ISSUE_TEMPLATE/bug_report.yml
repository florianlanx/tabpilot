name: Bug Report
description: Report a bug to help us improve TabPilot
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below.

  - type: input
    id: chrome-version
    attributes:
      label: Chrome Version
      description: "Find it at chrome://version"
      placeholder: "e.g. 124.0.6367.91"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Windows 11, macOS 14.4, Ubuntu 22.04"
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: TabPilot Version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what happened
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: ai-enabled
    attributes:
      label: AI Feature
      description: Is the AI feature enabled?
      options:
        - "Disabled (rule engine only)"
        - "Enabled - OpenAI"
        - "Enabled - Claude"
        - "Enabled - Gemini"
        - "Enabled - Custom endpoint"
    validations:
      required: true

  - type: textarea
    id: console-errors
    attributes:
      label: Console Errors (if any)
      description: Open chrome://extensions → TabPilot → "Inspect views" → Console tab
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem
